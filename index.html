    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --main-blue: #2563eb; 
            --bg-light: #f8fafc;

        /* Utils */
        .glass-morphism { background: rgba(255, 255, 255, 0.95); border-bottom: 1px solid rgba(226, 232, 240, 1); backdrop-filter: blur(10px); }
        .section-intro { max-width: 800px; margin: 0 auto 4rem; text-align: center; color: #64748b; line-height: 1.7; font-size: 1.1rem; }
        .hover-scale { transition: transform 0.2s ease-out, border-color 0.2s; cursor: pointer; }
        .hover-scale:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1); }
        
        /* Code Tab */
        .code-window { background: var(--code-bg); border-radius: 0.75rem; overflow: hidden; border: 1px solid #334155; }
        .code-header { background: #262626; padding: 0.75rem 1.25rem; display: flex; gap: 0.6rem; align-items: center; border-bottom: 1px solid #3f3f3f; }
        .dot { width: 0.75rem; height: 0.75rem; border-radius: 50%; opacity: 0.9; }
        .dot-red { background: #ef4444; } .dot-yellow { background: #f59e0b; } .dot-green { background: #10b981; }
        .code-tabs { display: flex; background: #1e1e1e; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #333; }
        .code-tab { padding: 0.75rem 1.5rem; color: #94a3b8; font-size: 0.9rem; cursor: pointer; border-right: 1px solid #333; transition: all 0.2s; white-space: nowrap; }
        .code-tab:hover { background: #262626; color: #e2e8f0; }
        .code-tab.active { background: #1e1e1e; color: #60a5fa; border-top: 3px solid #60a5fa; }
        .code-content { padding: 0; max-height: 500px; overflow-y: auto; }
        .code-content pre { margin: 0; }
        .code-content code { font-family: 'Fira Code', monospace; font-size: 0.9rem; line-height: 1.6; }
        .code-content::-webkit-scrollbar { width: 8px; height: 8px; }
        .code-content::-webkit-scrollbar-track { background: #1e1e1e; }
        .code-content::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        /* Architecture Diagram Box */
        .arch-container { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: center; padding: 1rem; background: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .arch-box { display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border: 1px solid #cbd5e1; border-radius: 8px; padding: 1.25rem 1rem; min-width: 120px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .arch-arrow { color: #94a3b8; font-size: 1.2rem; }
        .arch-label { font-size: 0.75rem; font-weight: 800; color: #64748b; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .arch-icon { font-size: 1.75rem; color: #2563eb; margin-bottom: 0.5rem; }
        
        .process-step { position: relative; padding-left: 2rem; border-left: 2px solid #e2e8f0; padding-bottom: 2rem; }
        .process-step:last-child { border-left: none; padding-bottom: 0; }
        .process-step::before { content: ''; position: absolute; left: -0.55rem; top: 0.25rem; width: 1.1rem; height: 1.1rem; background: #fff; border: 3px solid #2563eb; border-radius: 50%; }
        .process-step h5 { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 0.25rem; }
        .process-step p { font-size: 0.9rem; color: #64748b; }
    </style>
